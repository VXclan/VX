<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VX CLAN | SCHEDULE & STREAM</title>
    
    <!-- favicon 設定 -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- CSS 變數定義：支援深淺主題切換 --- */
        :root {
            /* 深色主題變數 (VX 戰隊經典霓虹黃與青色微光) */
            --bg-main: #0b0b0d;
            --bg-gradient: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #05050a 100%);
            --bg-nav: rgba(11, 11, 13, 0.8);
            --bg-card: rgba(25, 25, 28, 0.6);
            --text-main: #ffffff;
            --text-muted: #6b7280; /* Tailwind text-gray-500/600 類似色 */
            --theme-yellow: #ffea00;
            --card-border: rgba(255, 255, 255, 0.08);
            --card-border-hover: #ffea00;
            --cursor-glow-color: rgba(255, 234, 0, 0.15);
            --cursor-glow-hover: rgba(0, 173, 181, 0.5);
        }

        [data-theme="light"] {
            /* 淺色主題變數 (GitHub 經典灰白藍風格) */
            --bg-main: #fafafa;
            --bg-gradient: radial-gradient(circle at 50% 50%, #f0f2f5 0%, #e4e7eb 100%);
            --bg-nav: rgba(250, 250, 250, 0.85);
            --bg-card: rgba(255, 255, 255, 0.95);
            --text-main: #24292f;
            --text-muted: #57606a;
            --theme-yellow: #0969da; /* 轉為 GitHub 經典藍 */
            --card-border: #d0d7de;
            --card-border-hover: #0969da;
            /* 調整淺色模式下的藍色滑鼠微光顏色，使其在白底上更明顯 */
            --cursor-glow-color: rgba(9, 105, 218, 0.25);
            --cursor-glow-hover: rgba(9, 105, 218, 0.5);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif; 
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }
        
        body { 
            background-color: var(--bg-main); 
            background-image: var(--bg-gradient);
            color: var(--text-main); 
            min-height: 100vh; 
            overflow-x: hidden; 
            /* 移除固定的 padding-top，改由 sticky 導覽列自然推開 */
        }

        /* --- 頂部導覽列 (Navigation Bar) --- */
        .top-nav {
            position: sticky; /* 改為 sticky 磁吸，自動佔用高度防止與內容重疊 */
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: var(--bg-nav);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 9990;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            height: 100%;
            text-decoration: none;
            padding: 5px 0;
        }

        .nav-logo img {
            height: 45px;
            width: auto;
            object-fit: contain;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
            align-items: center;
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--theme-yellow);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            color: var(--theme-yellow);
            border-bottom: 2px solid var(--theme-yellow);
            border-radius: 0;
            text-shadow: 0 0 8px var(--theme-yellow);
        }

        .nav-actions {
            display: flex;
            align-items: center;
        }

        /* 主題切換按鈕 */
        .theme-toggle-btn {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            color: var(--theme-yellow);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.3s;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.05);
            border-color: var(--theme-yellow);
            box-shadow: 0 4px 20px var(--cursor-glow-hover);
        }
        
        /* --- 互動滑鼠微光 --- */
        .cursor-glow {
            position: fixed; 
            width: 60px; 
            height: 60px; 
            background: radial-gradient(circle, var(--cursor-glow-color) 0%, transparent 70%);
            border-radius: 50%; 
            pointer-events: none; 
            z-index: 9999; 
            transform: translate(-50%, -50%); 
            transition: width 0.3s, height 0.3s, background 0.3s;
            display: none;
        }

        .cursor-glow.hovered {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--cursor-glow-hover) 0%, transparent 70%);
        }

        /* --- 3D 卡片與賽程樣式 --- */
        .social-card {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            transition: transform 0.2s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            transform-style: preserve-3d;
        }

        .social-card:hover { 
            border-color: var(--card-border-hover); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
        }

        .card-title { 
            font-weight: bold; 
            color: var(--theme-yellow); 
            margin-bottom: 1rem; 
            font-size: 1.25rem;
            text-shadow: 0 0 10px var(--cursor-glow-color);
        }

        .text-muted-custom {
            color: var(--text-muted);
        }

        /* --- 響應式微調 (平板 & 手機端優化) --- */
        @media (max-width: 768px) {
            .top-nav {
                padding: 15px;
                height: auto;
                min-height: 60px;
                flex-direction: column;
                justify-content: center;
                gap: 12px;
            }
            /* 移除手機版 body padding-top 的寫死設定，sticky 會自動完美適配 */
            .nav-menu {
                gap: 15px;
                width: 100%;
                justify-content: center;
                overflow-x: auto;
                padding-bottom: 5px;
            }
            .nav-link {
                padding: 6px 12px;
                font-size: 0.9rem;
            }
            .theme-toggle-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- 頂部導覽列 -->
    <nav class="top-nav">
        <!-- 戰隊 LOGO -->
        <a href="index.html" class="nav-logo" style="display: flex; align-items: center; padding: 0;">
            <img src="logo.png" alt="VX CLAN" style="height: 45px; width: auto; object-fit: contain;">
        </a>
        
        <!-- 選單項目 -->
        <ul class="nav-menu">
            <li><a href="index.html" class="nav-link">首頁</a></li>
            <li><a href="成員名單.html" class="nav-link">成員名單</a></li>
            <li><a href="團戰.html" class="nav-link active">團戰賽程</a></li>
            <li><a href="合作.html" class="nav-link">合作夥伴</a></li>
        </ul>
        
        <!-- 操作按鈕 -->
        <div class="nav-actions">
            <button id="themeToggle" class="theme-toggle-btn">
                <span id="themeIcon">🌙</span> <span id="themeText">深色模式</span>
            </button>
        </div>
    </nav>

    <!-- 粒子微光滑鼠隨動特效容器 -->
    <div class="cursor-glow"></div>

    <!-- 內容區域（加入 px-4 防止手機版卡片貼齊螢幕邊緣） -->
    <header class="max-w-4xl mx-auto text-center py-16 px-4">
        <h1 class="text-5xl font-bold mb-4 tracking-tighter">VX <span class="card-title">賽程 & 轉播</span></h1>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 pb-16 px-4">
        
        <!-- 比賽賽程 -->
        <div class="social-card p-6 rounded-2xl">
            <div class="card-title">比賽賽程</div>
            <div class="text-muted-custom text-center py-16 text-sm italic">
                尚無賽程資訊
            </div>
        </div>

        <!-- 比賽轉播 -->
        <div class="social-card p-6 rounded-2xl">
            <div class="card-title">比賽轉播</div>
            <div class="text-muted-custom text-center py-16 text-sm italic">
                尚無轉播資訊
            </div>
        </div>

    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // ==========================================
            // 1. 深淺主題切換邏輯 (LocalStorage 記憶)
            // ==========================================
            const themeToggleBtn = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            
            // 讀取先前儲存的主題，預設為深色模式
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeUI(newTheme);
            });

            function updateThemeUI(theme) {
                if (theme === 'dark') {
                    themeIcon.textContent = '🌙';
                    themeText.textContent = '深色模式';
                } else {
                    themeIcon.textContent = '☀️';
                    themeText.textContent = '淺色模式';
                }
            }

            // ==========================================
            // 2. 微光游標隨動與互動縮放
            // ==========================================
            const cursor = document.querySelector('.cursor-glow');
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            
            if (!isTouchDevice) {
                cursor.style.display = 'block'; // 只有電腦端才顯示游標隨動
                
                document.addEventListener('mousemove', (e) => {
                    requestAnimationFrame(() => {
                        cursor.style.left = e.clientX + 'px';
                        cursor.style.top = e.clientY + 'px';
                    });
                });

                // 連動所有互動元素，滑鼠移入時放大微光
                const updateInteractiveListeners = () => {
                    const interactiveElements = document.querySelectorAll(
                        '.social-card, .theme-toggle-btn, .nav-link, .nav-logo'
                    );
                    interactiveElements.forEach(el => {
                        el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
                        el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
                    });
                };
                updateInteractiveListeners();
            }

            // ==========================================
            // 3. 3D 卡片傾斜效果
            // ==========================================
            if (!isTouchDevice) {
                document.querySelectorAll('.social-card').forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        const rotateX = ((e.clientY - rect.top) / rect.height - 0.5) * -10;
                        const rotateY = ((e.clientX - rect.left) / rect.width - 0.5) * 10;
                        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
                    });
                    card.addEventListener('mouseleave', () => {
                        card.style.transform = 'rotateX(0deg) rotateY(0deg) translateY(0px)';
                    });
                });
            }
        });
    </script>
</body>
</html>
