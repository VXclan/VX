<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VX Clan | 合作夥伴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: #0b0b0d;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #05050a 100%);
        }

        /* --- 互動滑鼠微光 (對應戰隊風格) --- */
        .cursor-glow {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255, 234, 0, 0.3) 0%, rgba(255, 145, 0, 0) 70%);
            border-radius: 50%;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
            mix-blend-mode: screen;
        }

        /* 霓虹標題 */
        .header { margin-top: 120px; text-align: center; margin-bottom: 80px; }
        h1 { 
            font-size: 3.5rem; 
            color: #ffea00; 
            text-shadow: 0 0 15px #ffea00, 0 0 30px rgba(255, 234, 0, 0.4); 
            letter-spacing: 8px; 
            text-transform: uppercase;
        }

        /* 3D 卡片容器 */
        .partner-grid {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            padding: 20px;
            perspective: 1000px;
        }

        .partner-card {
            background: rgba(18, 18, 22, 0.9);
            border: 2px solid #ffea00;
            border-radius: 20px;
            padding: 40px;
            width: 380px;
            text-decoration: none;
            color: #fff;
            transition: transform 0.2s ease-out, box-shadow 0.3s;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            cursor: pointer;
            transform-style: preserve-3d;
            border: 1px solid rgba(255, 234, 0, 0.3);
        }

        .partner-card:hover {
            box-shadow: 0 0 40px rgba(255, 234, 0, 0.2);
            border-color: rgba(255, 234, 0, 0.8);
        }

        .partner-name { 
            font-size: 1.4rem; 
            font-weight: bold; 
            margin-bottom: 25px; 
            display: block; 
            color: #ffea00; 
            text-shadow: 0 0 10px rgba(255, 234, 0, 0.3);
        }
        
        .btn { 
            display: inline-block; 
            padding: 12px 30px; 
            border: 1px solid #ffea00; 
            border-radius: 30px; 
            color: #ffea00; 
            text-decoration: none; 
            margin-top: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover { 
            background: #ffea00; 
            color: #000; 
            box-shadow: 0 0 20px rgba(255, 234, 0, 0.5);
        }

        .back-link { margin-top: 100px; color: #666; text-decoration: none; transition: 0.3s; font-size: 0.9rem; }
        .back-link:hover { color: #ffea00; }
    </style>
</head>
<body>

    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="header">
        <h1>合作夥伴</h1>
    </div>

    <div class="partner-grid">
        <!-- 合作對象 1 -->
        <a href="https://discord.gg/5gcSAqvMRm" target="_blank" class="partner-card">
            <span class="partner-name">𝓡𝓲𝓿𝓪𝓵𝓼 𝓤𝓷𝓲𝓽𝓮𝓭 𝓣𝓮𝓪𝓶 𝓒𝓸𝓾𝓷𝓬𝓲𝓵 [𝓡.𝓤.𝓣.𝓒]</span>
            <p>專業團隊，強強聯手</p>
            <div class="btn">加入 Discord</div>
        </a>

        <!-- 合作對象 2 -->
        <a href="https://discord.gg/SXn5uUQAub" target="_blank" class="partner-card">
            <span class="partner-name">🔥Lin的男娘交流群🔥</span>
            <p>熱絡社群，誠摯交流</p>
            <div class="btn">加入 Discord</div>
        </a>
    </div>

    <a href="index.html" class="back-link">← 返回戰隊首頁</a>

    <script>
        // 滑鼠微光跟隨
        const cursor = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 3D 卡片傾斜互動
        const cards = document.querySelectorAll('.partner-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                // 旋轉幅度限制
                const rotateX = ((yc - y) / yc) * 15;
                const rotateY = ((x - xc) / xc) * 15;
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'rotateX(0deg) rotateY(0deg) translateY(0px)';
            });
        });
    </script>
</body>
</html>
