<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的內嵌網頁</title>
    <style>
        /* 滿版容器設定 */
        .iframe-container {
            width: 100%;
            max-width: 1200px; /* 最大寬度限制，可自行調整 */
            margin: 0 auto;    /* 網頁置中 */
            padding: 10px;
        }
        
        /* 讓 iframe 根據容器自動伸縮 */
        .responsive-iframe {
            width: 100%;
            height: 75vh;     /* 佔據瀏覽器可視高度的 75% */
            border: 2px solid #00ffcc; /* 可以幫它加個炫酷的科技感邊框 */
            border-radius: 8px;        /* 圓角 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); /* 陰影特效 */
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <h2>正在瀏覽外部網站：</h2>
        <!-- 記得把 src 改成你想嵌入的網址 -->
        <iframe src="https://vxclan.wixstudio.com/vxclan" class="responsive-iframe"></iframe>
    </div>

</body>
</html>
