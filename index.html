<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VXCLAN</title>

    <!-- 1. 這裡已經替換成你的 Favicon 檔案名稱 -->
    <link rel="icon" href="favicon.png" type="image/png">

    <style>
        /* 讓嵌入的 Wix 網站完美填滿整個瀏覽器視窗 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* 設定黑色背景，防止載入時閃白光 */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- 2. 這裡已經嵌入你指定的 Wix Studio 網站 -->
    <iframe src="https://vxclan.wixstudio.com/vxclan" allow="fullscreen"></iframe>

</body>
