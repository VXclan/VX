<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VX CLAN</title>
    
    <!-- 這裡綁定你的小圖示 favicon.png -->
    <link id="web-favicon" rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* 讓嵌入的網站完美填滿整個螢幕，不留白邊 */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #000000; /* 可以改成配合你網站的背景色 */
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <!-- 嵌入 Wix 網站的框架 -->
    <iframe id="vx-frame" src=""></iframe>

    <script>
        // 你的 Wix Studio 基礎網址
        const WIX_BASE_URL = "https://vxclan.wixstudio.com/vxclan"; 

        // 路由對照表：[主網站後綴] : { url: Wix的頁面路徑, title: 分頁標題 }
        // 注意：Wix 的首頁通常直接是主網址，所以留空字串 "" 即可
        const routes = {
            "#/vx/home": {
                url: "",                
                title: "VX CLAN | 首頁"
            },
            "#/vx/list": {
                url: "/list", // 👈 請確認你在 Wix 後台設定的「名單頁」網址後綴是不是 /list，如果不是請在這邊修改
                title: "VX CLAN | 名單"
            }
        };

        function syncWebPage() {
            const currentHash = window.location.hash;
            const iframe = document.getElementById('vx-frame');
            const favicon = document.getElementById('web-favicon');

            // 確保每次切換，小圖示都維持是你的 favicon.png
            favicon.href = "favicon.png";

            if (routes[currentHash]) {
                const targetPage = routes[currentHash];
                iframe.src = WIX_BASE_URL + targetPage.url;
                document.title = targetPage.title;
            } else {
                // 如果輸入其他亂七八糟的後綴，預設導向首頁
                iframe.src = WIX_BASE_URL; 
                document.title = "VX CLAN";
            }
        }

        // 監聽網址變化
        window.addEventListener('hashchange', syncWebPage);
        // 網頁第一次載入時執行
        window.addEventListener('load', syncWebPage);
    </script>
</body>
</html>
