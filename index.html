<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 預設標題與預設 Favicon -->
    <title>VX</title>
    <link id="dynamic-favicon" rel="icon" href="favicon.png" type="image/png">

    <style>
        /* 基礎全螢幕設定 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: sans-serif;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 導覽按鈕選單樣式（你可以根據需求自行調整位置或外觀） */
        .nav-menu {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px); /* 模糊背景效果 */
        }

        .nav-menu button {
            color: #ffffff;
            background: #222222;
            border: 1px solid #444444;
            padding: 8px 16px;
            margin-right: 8px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .nav-menu button:hover {
            background: #444444;
        }
        
        .nav-menu button:last-child {
            margin-right: 0;
        }
    </style>
</head>
<body>

    <!-- 導覽選單：在這裡設定你要的分頁 -->
    <!-- 參數說明：changePage('後綴名稱', 'Favicon檔案名', 'Wix分頁網址') -->
    <div class="nav-menu">
        <button onclick="changePage('', 'favicon.png', 'https://vxclan.wixstudio.com/vxclan')">首頁</button>
        <button onclick="changePage(' - MEMBERS', 'favicon-members.png', 'https://vxclan.wixstudio.com/vxclan/members')">成員</button>
        <button onclick="changePage(' - ABOUT', 'favicon-about.png', 'https://vxclan.wixstudio.com/vxclan/about')">關於</button>
    </div>

    <!-- 嵌入的 iframe -->
    <iframe id="main-iframe" src="https://vxclan.wixstudio.com/vxclan" allow="fullscreen"></iframe>

    <script>
        function changePage(suffix, faviconSrc, url) {
            // 1. 更改瀏覽器分頁標題（VX 加上你設定的後綴）
            document.title = "VX" + suffix;
            
            // 2. 動態更換 Favicon 图示
            const favicon = document.getElementById('dynamic-favicon');
            if (favicon) {
                favicon.href = faviconSrc;
            }
            
            // 3. 切換 iframe 到對應的 Wix 網址
            const iframe = document.getElementById('main-iframe');
            if (iframe) {
                iframe.src = url;
            }
        }
    </script>

</body>
</html>
