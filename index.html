<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VX Clan 官方網站</title>
    <style>
        /* 移除網頁預設的邊距，防止出現雙重捲軸 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 隱藏外層捲軸，只保留內嵌網站的捲軸 */
            background-color: #0b0c10; /* 設定暗色背景，貼合戰隊霓虹風格 */
        }

        /* 讓內嵌框架完美充滿整個螢幕 */
        .vx-iframe-wrapper {
            width: 100%;
            height: 100%;
        }

        .vx-iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="vx-iframe-wrapper">
        <!-- 成功內嵌你的 Wix Studio 戰隊網站 -->
        <iframe 
            src="https://vxclan.wixstudio.com/vxclan" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
