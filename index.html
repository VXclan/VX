    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #0b0b0d;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- 互動滑鼠微光 --- */
        .cursor-glow {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(255, 234, 0, 0.4) 0%, rgba(255, 145, 0, 0) 70%);
            border-radius: 50%;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background 0.3s;
            mix-blend-mode: screen;
            display: none; /* 預設隱藏，有滑鼠的裝置才會被 JS 啟動 */
        }

        /* 當滑鼠移到可互動元素上時，微光放大並變色 */
        .cursor-glow.hovered {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(0, 173, 181, 0.5) 0%, rgba(0, 173, 181, 0) 70%);
        }

        /* --- 動畫基礎設定 --- */
        .reveal {
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, opacity;
        }

        /* 向上漸顯 */
        .fade-up {
            transform: translateY(60px);
        }

        /* 向右滑入 */
        .fade-left {
            transform: translateX(-50px);
        }

        /* 縮放漸顯 */
        .scale-up {
            transform: scale(0.9);
        }

        /* 啟用動畫後的狀態 */
        .reveal.active {
            opacity: 1;
            transform: translate(0, 0) scale(1);
        }

        /* 第一幕 */
        .hero-section {
            height: 100vh;
            background-image: url('背景.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
        }

        h1 {
            margin-top: 65vh;
            font-size: 4.5rem;
            font-weight: 900;
            color: #ffea00;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 
                0 0 5px #ffea00,
                0 0 10px #ffea00,
                0 0 20px #ff9100,
                0 0 40px #ff9100;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            animation: neonPulse 2s ease-in-out infinite alternate;
            animation-delay: 1.2s; /* 登場動畫完畢後再啟動呼吸燈 */
        }

        @keyframes neonPulse {
            from {
                text-shadow: 
                    0 0 5px #ffea00,
                    0 0 10px #ffea00,
                    0 0 20px #ff9100,
                    0 0 30px #ff9100;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 10px #ffea00,
                    0 0 25px #ffea00,
                    0 0 45px #ff9100,
                    0 0 60px #ff5500,
                    0 0 80px #ff5500;
                transform: scale(1.03);
            }
        }

        /* 第二幕 */
        .second-section {
            min-height: 100vh;
            background-color: #121216;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        h2 {
            font-size: 2.5rem;
            color: #ffea00;
            margin-bottom: 50px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255, 234, 0, 0.4);
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 50px;
        }

        /* 互動式特色項目 */
        .feature-item {
            background: #1a1a22;
            padding: 25px 30px;
            border-radius: 12px;
            border-left: 5px solid #ffea00;
            font-size: 1.3rem;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* 特色卡片的探照發光背景效果 */
        .feature-item::before {
            content: '';
            position: absolute;
            top: var(--y, 0);
            left: var(--x, 0);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 234, 0, 0.08) 0%, rgba(255,255,255,0) 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .feature-item:hover::before {
            opacity: 1;
        }

        .feature-item:hover {
            transform: translateX(10px);
            box-shadow: 0 5px 25px rgba(255, 234, 0, 0.15);
            background: #20202a;
        }

        .alliance-card {
            background: linear-gradient(135deg, #1e1e26 0%, #15151c 100%);
            padding: 35px;
            border-radius: 16px;
            border: 2px dashed #ffea00;
            box-shadow: 0 0 20px rgba(255, 234, 0, 0.1);
            transition: box-shadow 0.3s, transform 0.3s;
        }

        .alliance-card:hover {
            box-shadow: 0 0 30px rgba(255, 234, 0, 0.25);
            transform: scale(1.02);
        }

        .alliance-name {
            font-size: 1.5rem;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 第三幕 */
        .third-section {
            min-height: 100vh;
            background-image: url('背景.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        /* 3D 傾斜容器 */
        .social-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 30px;
            width: 100%;
            perspective: 1000px; /* 3D 空間透視距離 */
        }

        .social-card {
            background: rgba(18, 18, 22, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 50px 30px;
            width: 340px;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.1s ease-out, box-shadow 0.3s, border-color 0.3s;
            position: relative;
            transform-style: preserve-3d; /* 讓子元素支援 3D 層次 */
        }

        /* 3D 特效子元素突起效果 */
        .social-card .icon-wrapper,
        .social-card h3,
        .social-card p,
        .social-card .action-btn {
            transform: translateZ(30px); /* 滑鼠移入時，文字跟圖標會立體懸浮高於卡片表面 */
            transition: transform 0.3s ease;
        }

        /* Discord 卡片外觀與懸停發光 */
        .card-discord {
            border: 2px solid #5865f2;
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.15);
        }

        .card-discord:hover {
            box-shadow: 0 20px 50px rgba(88, 101, 242, 0.6);
        }

        /* LINE 卡片外觀與懸停發光 */
        .card-line {
            border: 2px solid #06c755;
            box-shadow: 0 10px 30px rgba(6, 199, 85, 0.15);
        }

        .card-line:hover {
            box-shadow: 0 20px 50px rgba(6, 199, 85, 0.6);
        }

        /* 圖標外層容器 */
        .icon-wrapper {
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        .social-card:hover .icon-wrapper {
            transform: translateZ(50px) scale(1.15) rotate(5deg); /* 圖標會以更大弧度突起並旋轉 */
        }

        .icon-wrapper svg {
            width: 100%;
            height: 100%;
        }

        /* Discord 圖標顏色 */
        .card-discord .icon-wrapper svg {
            filter: drop-shadow(0 0 10px rgba(88, 101, 242, 0.6));
        }

        /* LINE 圖標顏色 */
        .card-line .icon-wrapper svg {
            filter: drop-shadow(0 0 10px rgba(6, 199, 85, 0.6));
        }

        /* 卡片文字排版 */
        .social-card h3 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .social-card p {
            font-size: 1rem;
            color: #a8a8b3;
            margin-bottom: 35px;
            line-height: 1.6;
            flex-grow: 1;
        }

        /* 立即加入按鈕樣式 */
        .action-btn {
            width: 100%;
            padding: 12px 0;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            transition: transform 0.3s, background-color 0.3s;
        }

        .card-discord .action-btn {
            background-color: #5865f2;
            color: #ffffff;
        }

        .card-discord:hover .action-btn {
            background-color: #4752c4;
            transform: translateZ(40px) scale(1.05);
        }

        .card-line .action-btn {
            background-color: #06c755;
            color: #ffffff;
        }

        .card-line:hover .action-btn {
            background-color: #05a044;
            transform: translateZ(40px) scale(1.05);
        }
    </style>
</head>

    <!-- 交互與動畫控制腳本 -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // ==========================================
            // 1. 首頁主標題登場動畫
            // ==========================================
            const heroTitle = document.getElementById('hero-title');
            if (heroTitle) {
                setTimeout(() => {
                    heroTitle.classList.add('active');
                }, 150);
            }

            // ==========================================
            // 2. 滾動偵測（偵測元素是否進入畫面中）
            // ==========================================
            const revealElements = document.querySelectorAll('.reveal');
            
            const observerOptions = {
                root: null,
                threshold: 0.15,
                rootMargin: "0px 0px -40px 0px"
            };

            const revealObserver = new IntersectionObserver(function(entries, observer) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            revealElements.forEach(element => {
                revealObserver.observe(element);
            });

            // ==========================================
            // 3. 微光游標隨動與互動縮放
            // ==========================================
            const cursorGlow = document.getElementById('cursor-glow');
            
            // 偵測是否為行動裝置，避免手機出現不自然的圓圈
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            
            if (!isTouchDevice) {
                cursorGlow.style.display = 'block'; // 只有電腦端才顯示游標隨動
                
                document.addEventListener('mousemove', (e) => {
                    // 使用 requestAnimationFrame 達到極速渲染
                    requestAnimationFrame(() => {
                        cursorGlow.style.left = `${e.clientX}px`;
                        cursorGlow.style.top = `${e.clientY}px`;
                    });
                });

                // 讓滑鼠移到卡片或按鈕上時，微光放大並轉為青色
                const interactiveElements = document.querySelectorAll('.social-card, .feature-item, .alliance-card');
                interactiveElements.forEach(el => {
                    el.addEventListener('mouseenter', () => {
                        cursorGlow.classList.add('hovered');
                    });
                    el.addEventListener('mouseleave', () => {
                        cursorGlow.classList.remove('hovered');
                    });
                });
            }

            // ==========================================
            // 4. 第二幕：特色項目雷射追蹤微光
            // ==========================================
            const featureItems = document.querySelectorAll('.feature-item');
            featureItems.forEach(item => {
                item.addEventListener('mousemove', (e) => {
                    const rect = item.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    item.style.setProperty('--x', `${x}px`);
                    item.style.setProperty('--y', `${y}px`);
                });
            });

            // ==========================================
            // 5. 第三幕：3D Card Tilt 立體傾斜效果
            // ==========================================
            const cards = document.querySelectorAll('.social-card');
            
            if (!isTouchDevice) {
                cards.forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        
                        // 計算滑鼠在卡片內的位置百分比 (-0.5 ~ 0.5)
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        const xc = rect.width / 2;
                        const yc = rect.height / 2;
                        
                        // 旋轉幅度限制 (最大旋轉 15 度)
                        const rotateX = ((yc - y) / yc) * 15;
                        const rotateY = ((x - xc) / xc) * 15;
                        
                        // 套用 3D 旋轉效果
                        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px)`;
                    });
                    
                    // 當滑鼠離開卡片時，平滑還原卡片狀態
                    card.addEventListener('mouseleave', () => {
                        card.style.transform = 'rotateX(0deg) rotateY(0deg) translateY(0px)';
                    });
                });
            }
        });
    </script>
