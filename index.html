<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VX CLAN | 官方網站</title>
    
    <!-- favicon 設定 -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* --- CSS 變數定義：支援深淺主題切換 --- */
        :root {
            /* 深色主題變數 (VX 戰隊經典霓虹黃與青色微光) */
            --bg-main: #0b0b0d;
            --bg-gradient: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #05050a 100%);
            --bg-hero: url('背景.jpg');
            --bg-section2: #121216;
            --bg-card: rgba(18, 18, 22, 0.85);
            --bg-nav: rgba(11, 11, 13, 0.8);
            --bg-feature: #1a1a22;
            --bg-feature-hover: #20202a;
            --text-main: #ffffff;
            --text-muted: #a8a8b3;
            --theme-yellow: #ffea00;
            --theme-pulse-to: #ff9100;
            --theme-pulse-to2: #ff5500;
            --card-border: rgba(255, 255, 255, 0.08);
            --cursor-glow-color: rgba(255, 234, 0, 0.4);
            --cursor-glow-hover: rgba(0, 173, 181, 0.5);
        }

        [data-theme="light"] {
            /* 淺色主題變數 (GitHub 經典灰白藍風格) */
            --bg-main: #fafafa;
            --bg-gradient: radial-gradient(circle at 50% 50%, #f0f2f5 0%, #e4e7eb 100%);
            --bg-hero: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('背景.jpg');
            --bg-section2: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-nav: rgba(250, 250, 250, 0.85);
            --bg-feature: #f6f8fa;
            --bg-feature-hover: #eaeef2;
            --text-main: #24292f;
            --text-muted: #57606a;
            --theme-yellow: #0969da; /* 轉為 GitHub 經典藍 */
            --theme-pulse-to: #218bff;
            --theme-pulse-to2: #0550ae;
            --card-border: #d0d7de;
            --cursor-glow-color: rgba(9, 105, 218, 0.2);
            --cursor-glow-hover: rgba(9, 105, 218, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-main);
            background-image: var(--bg-gradient);
            color: var(--text-main);
            overflow-x: hidden;
            padding-top: 70px; /* 預留給固定在頂部的導覽列 */
        }

        /* --- 頂部導覽列 (Navigation Bar) --- */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: var(--bg-nav);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 9990;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .nav-logo {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--theme-yellow);
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--theme-yellow);
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
            align-items: center;
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--theme-yellow);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            color: var(--theme-yellow);
            border-bottom: 2px solid var(--theme-yellow);
            border-radius: 0;
            text-shadow: 0 0 8px var(--theme-yellow);
        }

        .nav-actions {
            display: flex;
            align-items: center;
        }

        /* 主題切換按鈕 */
        .theme-toggle-btn {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            color: var(--theme-yellow);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.3s;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.05);
            border-color: var(--theme-yellow);
            box-shadow: 0 4px 20px var(--cursor-glow-hover);
        }

        /* --- 互動滑鼠微光 --- */
        .cursor-glow {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, var(--cursor-glow-color) 0%, rgba(255, 145, 0, 0) 70%);
            border-radius: 50%;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background 0.3s;
            mix-blend-mode: screen;
            display: none;
        }

        .cursor-glow.hovered {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, var(--cursor-glow-hover) 0%, rgba(0, 173, 181, 0) 70%);
        }

        /* --- 動畫基礎設定 --- */
        .reveal {
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, opacity;
        }

        .fade-up { transform: translateY(60px); }
        .fade-left { transform: translateX(-50px); }
        .scale-up { transform: scale(0.9); }

        .reveal.active {
            opacity: 1;
            transform: translate(0, 0) scale(1);
        }

        /* 第一幕 */
        .hero-section {
            height: calc(100vh - 70px);
            background-image: var(--bg-hero);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
        }

        h1 {
            margin-top: 55vh;
            font-size: 4.5rem;
            font-weight: 900;
            color: var(--theme-yellow);
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 
                0 0 5px var(--theme-yellow),
                0 0 10px var(--theme-yellow),
                0 0 20px var(--theme-pulse-to);
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, text-shadow;
        }

        h1.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            animation: neonPulse 2s ease-in-out infinite alternate;
            animation-delay: 1.2s;
        }

        @keyframes neonPulse {
            from {
                text-shadow: 0 0 5px var(--theme-yellow), 0 0 10px var(--theme-yellow), 0 0 20px var(--theme-pulse-to);
            }
            to {
                text-shadow: 0 0 10px var(--theme-yellow), 0 0 25px var(--theme-yellow), 0 0 45px var(--theme-pulse-to), 0 0 60px var(--theme-pulse-to2);
            }
        }

        /* 第二幕 */
        .second-section {
            min-height: 100vh;
            background-color: var(--bg-section2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        h2 {
            font-size: 2.5rem;
            color: var(--theme-yellow);
            margin-bottom: 50px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255, 234, 0, 0.2);
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 50px;
        }

        .feature-item {
            background: var(--bg-feature);
            padding: 25px 30px;
            border-radius: 12px;
            border-left: 5px solid var(--theme-yellow);
            font-size: 1.3rem;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s, border-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .feature-item::before {
            content: '';
            position: absolute;
            top: var(--y, 0);
            left: var(--x, 0);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--cursor-glow-color) 0%, rgba(255,255,255,0) 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .feature-item:hover::before { opacity: 1; }

        .feature-item:hover {
            transform: translateX(10px);
            box-shadow: 0 5px 25px var(--cursor-glow-color);
            background: var(--bg-feature-hover);
        }

        .alliance-card {
            background: var(--bg-feature);
            padding: 35px;
            border-radius: 16px;
            border: 2px dashed var(--theme-yellow);
            box-shadow: 0 0 20px rgba(255, 234, 0, 0.05);
            transition: box-shadow 0.3s, transform 0.3s, border-color 0.3s;
        }

        .alliance-card:hover {
            box-shadow: 0 0 30px var(--cursor-glow-color);
            transform: scale(1.02);
        }

        .alliance-name {
            font-size: 1.5rem;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 第三幕 */
        .third-section {
            min-height: 100vh;
            background-image: var(--bg-hero);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .social-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 30px;
            width: 100%;
            perspective: 1000px;
        }

        .social-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 50px 30px;
            width: 340px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            /* 調整過渡動畫：當移出卡片時由 JS 接管，這裡保持原本的即時響應 */
            transition: transform 0.1s ease-out, box-shadow 0.3s, border-color 0.3s;
            position: relative;
            transform-style: preserve-3d;
            border: 1px solid var(--card-border);
        }

        .social-card .icon-wrapper, h3, p, .action-btn {
            transform: translateZ(30px);
            transition: transform 0.3s ease;
        }

        .card-discord { border: 2px solid #5865f2; box-shadow: 0 10px 30px rgba(88, 101, 242, 0.15); }
        .card-discord:hover { box-shadow: 0 20px 50px rgba(88, 101, 242, 0.5); }
        .card-line { border: 2px solid #06c755; box-shadow: 0 10px 30px rgba(6, 199, 85, 0.15); }
        .card-line:hover { box-shadow: 0 20px 50px rgba(6, 199, 85, 0.5); }

        .icon-wrapper { width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; transition: transform 0.3s ease; }
        .social-card:hover .icon-wrapper { transform: translateZ(50px) scale(1.15) rotate(5deg); }
        .icon-wrapper svg { width: 100%; height: 100%; }
        .card-discord .icon-wrapper svg { filter: drop-shadow(0 0 10px rgba(88, 101, 242, 0.6)); }
        .card-line .icon-wrapper svg { filter: drop-shadow(0 0 10px rgba(6, 199, 85, 0.6)); }

        .social-card h3 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; letter-spacing: 1px; color: var(--text-main); }
        .social-card p { font-size: 1rem; color: var(--text-muted); margin-bottom: 35px; line-height: 1.6; flex-grow: 1; }

        .action-btn { width: 100%; padding: 12px 0; border-radius: 50px; font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; transition: transform 0.3s, background-color 0.3s; }
        .card-discord .action-btn { background-color: #5865f2; color: #ffffff; }
        .card-discord:hover .action-btn { background-color: #4752c4; transform: translateZ(40px) scale(1.05); }
        .card-line .action-btn { background-color: #06c755; color: #ffffff; }
        .card-line:hover .action-btn { background-color: #05a044; transform: translateZ(40px) scale(1.05); }

        /* --- 響應式微調 (平板 & 手機端優化) --- */
        @media (max-width: 768px) {
            .top-nav {
                padding: 0 15px;
                height: auto;
                min-height: 60px;
                flex-direction: column;
                justify-content: center;
                gap: 10px;
                padding-top: 10px;
                padding-bottom: 10px;
            }
            body {
                padding-top: 120px; /* 修正：提高預留高度以適應手機雙排導覽列 */
            }
            .nav-menu {
                gap: 15px;
                width: 100%;
                justify-content: flex-start; /* 修正：手機端靠左讓使用者可以滑動 */
                overflow-x: auto;
                padding-bottom: 5px;
                white-space: nowrap; /* 防止手機端標籤折行 */
                -webkit-overflow-scrolling: touch; /* 讓 iOS 滑動更平滑 */
            }
            /* 隱藏手機選單的滾動條，畫面更乾淨 */
            .nav-menu::-webkit-scrollbar {
                display: none;
            }
            .nav-link {
                padding: 6px 12px;
                font-size: 0.9rem;
            }
            .theme-toggle-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .hero-section {
                height: calc(100vh - 120px);
            }
            h1 {
                font-size: 3rem;
                margin-top: 40vh;
            }
        }
    </style>
</head>

    <!-- 交互與動畫控制腳本 -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // ==========================================
            // 1. 深淺主題切換邏輯
            // ==========================================
            const themeToggleBtn = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeUI(newTheme);
            });

            function updateThemeUI(theme) {
                if (theme === 'dark') {
                    themeIcon.textContent = '🌙';
                    themeText.textContent = '深色模式';
                } else {
                    themeIcon.textContent = '☀️';
                    themeText.textContent = '淺色模式';
                }
            }

            // ==========================================
            // 2. 首頁主標題登場動畫
            // ==========================================
            const heroTitle = document.getElementById('hero-title');
            if (heroTitle) {
                setTimeout(() => {
                    heroTitle.classList.add('active');
                }, 150);
            }

            // ==========================================
            // 3. 滾動偵測
            // ==========================================
            const revealElements = document.querySelectorAll('.reveal');
            
            const observerOptions = {
                root: null,
                threshold: 0.15,
                rootMargin: "0px 0px -40px 0px"
            };

            const revealObserver = new IntersectionObserver(function(entries, observer) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        revealObserver.unobserve(entry.target);
                    }
                });
            }, observerOptions);
 
            revealElements.forEach(element => {
                revealObserver.observe(element);
            });

            // ==========================================
            // 4. 微光游標隨動與互動縮放
            // ==========================================
            const cursorGlow = document.getElementById('cursor-glow');
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            
            if (!isTouchDevice) {
                cursorGlow.style.display = 'block';
                
                document.addEventListener('mousemove', (e) => {
                    requestAnimationFrame(() => {
                        cursorGlow.style.left = `${e.clientX}px`;
                        cursorGlow.style.top = `${e.clientY}px`;
                    });
                });

                const updateInteractiveListeners = () => {
                    const interactiveElements = document.querySelectorAll(
                        '.social-card, .feature-item, .alliance-card, .theme-toggle-btn, .nav-link, .nav-logo'
                    );
                    interactiveElements.forEach(el => {
                        el.addEventListener('mouseenter', () => cursorGlow.classList.add('hovered'));
                        el.addEventListener('mouseleave', () => cursorGlow.classList.remove('hovered'));
                    });
                };
                updateInteractiveListeners();
            }

            // ==========================================
            // 5. 第二幕：特色項目雷射追蹤微光
            // ==========================================
            const featureItems = document.querySelectorAll('.feature-item');
            featureItems.forEach(item => {
                item.addEventListener('mousemove', (e) => {
                    const rect = item.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    item.style.setProperty('--x', `${x}px`);
                    item.style.setProperty('--y', `${y}px`);
                });
            });

            // ==========================================
            // 6. 第三幕：3D Card Tilt 立體傾斜效果 (優化平滑還原)
            // ==========================================
            const cards = document.querySelectorAll('.social-card');
            
            if (!isTouchDevice) {
                cards.forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        const xc = rect.width / 2;
                        const yc = rect.height / 2;
                        
                        const rotateX = ((yc - y) / yc) * 15;
                        const rotateY = ((x - xc) / xc) * 15;
                        
                        // 確保滑鼠在卡片內移動時保持即時反應
                        card.style.transition = 'transform 0.1s ease-out, box-shadow 0.3s';
                        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px)`;
                    });
                    
                    card.addEventListener('mouseleave', () => {
                        // 修正：離開卡片時給予 0.5s 的緩動，讓卡片平滑回彈，不再生硬閃爍
                        card.style.transition = 'transform 0.5s ease, box-shadow 0.3s, border-color 0.3s';
                        card.style.transform = 'rotateX(0deg) rotateY(0deg) translateY(0px)';
                    });
                });
            }
        });
    </script>
</body>
</html>
